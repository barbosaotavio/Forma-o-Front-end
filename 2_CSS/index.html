<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS</title>
    <style>
        p {
            color: gold;
            font-size: 40px;
        }
    </style>
</head>
<body>
    
    <!-- 1 - Inline CSS-->
    <h1 style="color: blue;">Mudar cor com o Inline</h1>
    <h1 style="color: red;">Outro Título</h1>

    <!-- 2 - Multiplas regras  -->
     <h1 style="color: blueviolet; font-size: 60px; border-bottom: 1px solid red;">
        Mudar cor e tamanho da fonte</h1>
    <!-- 3 - Internal CSS-->    
     <P>Fui estilizado pelo internal</P>
     <p>Mais um </p>
     <p>Outro</p>
</body>
</html>
